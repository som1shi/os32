<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom</title>
    <!-- Patch Keyboard.lock() before js-dos loads — it's banned in iframes -->
    <script>
        if (navigator.keyboard && navigator.keyboard.lock) {
            navigator.keyboard.lock = async () => { };
        }
    </script>
    <link rel="stylesheet" href="/js-dos.css">
    <script src="/emulators/emulators.js"></script>
    <script src="/js-dos.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #dos {
            width: 100%;
            height: 100%;
        }

        .jsdos-rso .sidebar,
        .jsdos-rso .sidebar-thin {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="dos"></div>
    <script>
        window.addEventListener('load', function () {
            Dos(document.getElementById('dos'), {
                pathPrefix: '/emulators/',
                url: '/doom.jsdos',
                noCloud: true,
                autoStart: true,
            });
        });
    </script>
</body>

</html>
